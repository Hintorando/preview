<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lite IDE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vanillatree@0.3.0/vanillatree.css">
    <script src="https://cdn.jsdelivr.net/npm/vanillatree@0.3.0/vanillatree.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

    <style>
        :root { --bg: #1e1e1e; --sidebar: #252526; --border: #333333; --text: #cccccc; --accent: #0e639c; }
        body { font-family: 'Segoe UI', sans-serif; display: grid; grid-template-columns: 260px 1fr 1fr; height: 100vh; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Sidebar Layout */
        #sidebar { background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .sidebar-tools { display: flex; gap: 8px; }
        .tool-icon { cursor: pointer; opacity: 0.7; transition: 0.2s; font-size: 16px; }
        .tool-icon:hover { opacity: 1; color: #fff; }

        /* VanillaTree Styling Override */
        #tree { flex: 1; overflow: auto; padding: 5px; }
        .vtree-item { color: var(--text); font-size: 13px; padding: 4px 8px; border-radius: 3px; cursor: pointer; }
        .vtree-item-selected { background: var(--accent) !important; color: white; }
        .vtree-item:hover:not(.vtree-item-selected) { background: #2a2d2e; }

        /* Editor & UI */
        #editor-container { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #monaco-editor { flex: 1; }
        #console-area { height: 180px; background: #1b1d23; border-top: 1px solid var(--border); overflow-y: auto; padding: 10px; font-family: monospace; font-size: 12px; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #2c313a; }

        #preview-container { background: white; display: flex; flex-direction: column; }
        .browser-bar { background: #eee; padding: 8px; display: flex; gap: 8px; border-bottom: 1px solid #ccc; }
        .address-input { flex: 1; padding: 4px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
        iframe { flex: 1; border: none; }
        .run-btn { background: var(--accent); color: white; border: none; padding: 10px; margin: 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <span style="font-size: 11px; font-weight: bold; text-transform: uppercase;">Explorer</span>
        <div class="sidebar-tools">
            <span class="tool-icon" onclick="createNewItem(false)" title="New File">📄+</span>
            <span class="tool-icon" onclick="createNewItem(true)" title="New Folder">📁+</span>
        </div>
    </div>
    <div id="tree"></div>
    <button class="run-btn" onclick="updatePreview()">▶ RUN PROJECT</button>
</div>

<div id="editor-container">
    <div style="padding:8px; background:var(--sidebar); font-size:12px;">Editing: <span id="currentPath" style="color:var(--accent)">index.html</span></div>
    <div id="monaco-editor"></div>
    <div id="console-area"></div>
</div>

<div id="preview-container">
    <div class="browser-bar">
        <input type="text" id="browserAddress" class="address-input" value="index.html">
        <button onclick="window.open(document.getElementById('preview').src, '_blank')" style="font-size:11px">New Tab</button>
    </div>
    <iframe id="preview"></iframe>
</div>

<script>
    let editor, tree;
    let currentPath = 'index.html';
    let files = JSON.parse(localStorage.getItem('v-ide-files')) || {
        'index.html': '<html><body><h1>Hello World</h1><script src="app.js"><\/script></body></html>',
        'app.js': 'console.log("App loaded!");'
    };

    // Initialize VanillaTree
    tree = new VanillaTree('#tree', {
        contextmenu: [
            { label: 'Delete', action: (id) => deleteItem(id) },
            { label: 'Rename', action: (id) => renameItem(id) }
        ]
    });

    document.getElementById('tree').addEventListener('vtree-select', (e) => {
        const path = e.detail.id;
        if (files[path] !== undefined && !path.endsWith('/')) {
            loadFile(path);
        }
    });

    function rebuildTree() {
        const treeEl = document.getElementById('tree');
        treeEl.innerHTML = ''; // Clear
        
        // Sort paths to ensure parents are created before children
        const paths = Object.keys(files).sort();
        
        paths.forEach(path => {
            const parts = path.split('/').filter(Boolean);
            let currentPathBuild = '';
            
            parts.forEach((part, index) => {
                const parent = currentPathBuild;
                const isLast = index === parts.length - 1;
                const isFolder = !isLast || path.endsWith('/');
                currentPathBuild += part + (isFolder ? '/' : '');
                
                // Add to tree if it doesn't exist
                try {
                    tree.add({
                        label: part,
                        id: currentPathBuild,
                        parent: parent || undefined,
                        opened: true
                    });
                } catch(e) {} // Ignore duplicates
            });
        });
    }

    function createNewItem(isFolder) {
        let name = prompt(`Enter ${isFolder ? 'folder' : 'file'} name:`);
        if (!name) return;
        
        const selected = tree.getSelectedNodes()[0];
        let prefix = '';
        if (selected) {
            prefix = selected.id.endsWith('/') ? selected.id : selected.id.substring(0, selected.id.lastIndexOf('/') + 1);
        }
        
        const newPath = prefix + name + (isFolder ? '/' : '');
        files[newPath] = isFolder ? null : "";
        save();
        rebuildTree();
        if(!isFolder) loadFile(newPath);
    }

    function deleteItem(id) {
        if(confirm(`Delete ${id}?`)) {
            Object.keys(files).forEach(p => { if(p.startsWith(id)) delete files[p]; });
            save();
            rebuildTree();
        }
    }

    function loadFile(path) {
        currentPath = path;
        document.getElementById('currentPath').textContent = path;
        const ext = path.split('.').pop();
        const lang = { 'js': 'javascript', 'html': 'html', 'css': 'css' }[ext] || 'plaintext';
        
        if (editor) {
            const model = monaco.editor.createModel(files[path], lang);
            editor.setModel(model);
        }
    }

    function save() { localStorage.setItem('v-ide-files', JSON.stringify(files)); }

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        editor = monaco.editor.create(document.getElementById('monaco-editor'), {
            theme: 'vs-dark',
            automaticLayout: true,
            value: files[currentPath]
        });
        editor.onDidChangeModelContent(() => {
            files[currentPath] = editor.getValue();
            save();
        });
        rebuildTree();
    });

    async function updatePreview() {
        if (!navigator.serviceWorker.controller) return alert("Please refresh the page to activate the preview engine.");
        const mc = new MessageChannel();
        mc.port1.onmessage = () => {
            const target = document.getElementById('browserAddress').value;
            document.getElementById('preview').src = `/virtual-project/${target}?t=${Date.now()}`;
        };
        navigator.serviceWorker.controller.postMessage({ type: 'UPDATE_FILES', files }, [mc.port2]);
    }

    window.addEventListener('message', e => {
        if (e.data.type === 'CONSOLE_LOG') {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.style.color = e.data.logType === 'error' ? '#f48771' : '#abb2bf';
            div.textContent = `[${e.data.logType}] ${e.data.msg}`;
            document.getElementById('console-area').appendChild(div);
        }
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js', {scope: '/'});
</script>
</body>
</html>
