<!DOCTYPE html>
<html>
<body>
  <h2>Mini IDE Previewer</h2>
  <button onclick="updatePreview()">Run Code</button>
  
  <div style="display: flex; gap: 10px;">
    <textarea id="htmlCode" rows="10" cols="30">
<html>
  <head><link rel="stylesheet" href="style.css"></head>
  <body>
    <h1>Hello World</h1>
    <script src="app.js"></script>
  </body>
</html></textarea>

    <textarea id="jsCode" rows="10" cols="30">
console.log('Script running from virtual file!');
document.body.style.backgroundColor = 'lightblue';</textarea>

    <textarea id="cssCode" rows="10" cols="30">
h1 { color: darkblue; font-family: sans-serif; }</textarea>
  </div>

  <hr>
  <iframe id="preview" src="about:blank" width="100%" height="300px"></iframe>

  <script>
    // 1. Register the Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => {
        console.log('Service Worker Registered');
      });
    }

    async function updatePreview() {
      const files = {
        'index.html': document.getElementById('htmlCode').value,
        'app.js': document.getElementById('jsCode').value,
        'style.css': document.getElementById('cssCode').value
      };

      // 2. Send the files to the Service Worker
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
          type: 'UPDATE_FILES',
          files: files
        });

        // 3. Load the "fake" URL into the iframe
        // We add a timestamp to force the iframe to reload properly
        document.getElementById('preview').src = `./virtual-project/index.html?t=${Date.now()}`;
      } else {
        alert("Service Worker not ready. Please refresh the page.");
      }
    }
  </script>
</body>
</html>
