<!DOCTYPE html>
<html>
<head>
    <title>Monaco Virtual IDE with Console</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: grid; grid-template-columns: 200px 1fr 1fr; height: 100vh; margin: 0; background: #1e1e1e; color: white; overflow: hidden; }
        #sidebar { border-right: 1px solid #333; padding: 10px; display: flex; flex-direction: column; }
        #editor-container { position: relative; border-right: 1px solid #333; display: flex; flex-direction: column; }
        #preview-container { background: white; display: flex; flex-direction: column; color: black; }
        
        /* Console Styles */
        #console-log { height: 150px; background: #252526; color: #ccc; font-family: monospace; font-size: 12px; overflow-y: auto; border-top: 2px solid #333; padding: 5px; }
        .log-entry { border-bottom: 1px solid #333; padding: 2px 5px; white-space: pre-wrap; }
        .log-error { color: #ff5555; background: rgba(255,0,0,0.1); }
        .log-warn { color: #ffb86c; }

        iframe { flex: 1; border: none; width: 100%; background: white; }
        .file-item { cursor: pointer; padding: 8px; font-size: 13px; border-radius: 4px; }
        .file-item.active { background: #37373d; box-shadow: inset 3px 0 0 #007acc; }
        button { background: #007acc; color: white; border: none; padding: 8px; cursor: pointer; margin: 5px 0; }
        input { background: #3c3c3c; border: 1px solid #555; color: white; padding: 5px; margin-bottom: 5px; width: 90%; }
        .toolbar { padding: 5px; background: #252526; font-size: 12px; color: #888; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="font-weight: bold; margin-bottom: 10px;">EXPLORER</div>
    <div id="fileList"></div>
    <input type="text" id="newFileName" placeholder="script.js">
    <button onclick="addTextFile()">+ New File</button>
    <button onclick="updatePreview()" style="background: #28a745; margin-top: 10px;">▶ Run Code</button>
    <button onclick="document.getElementById('console-log').innerHTML = ''" style="background: #444;">Clear Console</button>
</div>

<div id="editor-container">
    <div class="toolbar">EDITOR: <span id="currentFileName">index.html</span></div>
    <div id="monaco-editor" style="flex: 1;"></div>
    <div class="toolbar">CONSOLE</div>
    <div id="console-log"></div>
</div>

<div id="preview-container">
    <div class="toolbar" style="background: #ddd; color: #333;">PREVIEW</div>
    <iframe id="preview"></iframe>
</div>

<script>
    let editor;
    let currentFile = 'index.html';
    let files = {
        'index.html': { content: '<html><body>\n<h1>Console Test</h1>\n<script src="app.js"><\/script>\n</body></html>', lang: 'html' },
        'app.js': { content: 'console.log("Hello from the virtual world!");\nconsole.error("This is an error test.");\nconsole.warn("And a warning.");', lang: 'javascript' }
    };

    // 1. Setup Monaco
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        editor = monaco.editor.create(document.getElementById('monaco-editor'), {
            theme: 'vs-dark', automaticLayout: true, fontSize: 14
        });
        editor.onDidChangeModelContent(() => { if(files[currentFile]) files[currentFile].content = editor.getValue(); });
        renderFileList();
        loadFile('index.html');
    });

    // 2. File Management
    function renderFileList() {
        const list = document.getElementById('fileList');
        list.innerHTML = '';
        Object.keys(files).forEach(name => {
            const div = document.createElement('div');
            div.className = `file-item ${name === currentFile ? 'active' : ''}`;
            div.textContent = name;
            div.onclick = () => loadFile(name);
            list.appendChild(div);
        });
    }

    function loadFile(name) {
        currentFile = name;
        renderFileList();
        const model = monaco.editor.createModel(files[name].content, files[name].lang);
        editor.setModel(model);
        document.getElementById('currentFileName').textContent = name;
    }

    function addTextFile() {
        const name = document.getElementById('newFileName').value;
        if (name && !files[name]) {
            const ext = name.split('.').pop();
            const lang = ext === 'js' ? 'javascript' : ext === 'css' ? 'css' : 'html';
            files[name] = { content: '', lang };
            renderFileList();
            loadFile(name);
        }
    }

    // 3. The Preview and Console Hook
    async function updatePreview() {
        if (!navigator.serviceWorker.controller) return alert("Refresh page to activate Service Worker");

        const flatFiles = {};
        for (const [name, data] of Object.entries(files)) flatFiles[name] = data.content;
        
        navigator.serviceWorker.controller.postMessage({ type: 'UPDATE_FILES', files: flatFiles });

        const iframe = document.getElementById('preview');
        iframe.src = `./virtual-project/index.html?t=${Date.now()}`;

        // Wait for iframe to load, then hijack its console
        iframe.onload = () => {
            const win = iframe.contentWindow;
            
            // Standard console methods to override
            ['log', 'error', 'warn'].forEach(type => {
                const original = win.console[type];
                win.console[type] = (...args) => {
                    addToConsole(args.join(' '), type);
                    original.apply(win.console, args);
                };
            });
        };
    }

    function addToConsole(msg, type) {
        const logWin = document.getElementById('console-log');
        const div = document.createElement('div');
        div.className = `log-entry log-${type}`;
        div.textContent = `> ${msg}`;
        logWin.appendChild(div);
        logWin.scrollTop = logWin.scrollHeight; // Auto-scroll
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
