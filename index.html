<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web IDE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/themes/default/style.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jstree/3.3.12/jstree.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

    <style>
        :root { 
            --bg: #1e1e1e; 
            --sidebar: #252526; 
            --border: #333333; 
            --text: #cccccc; 
            --accent: #0e639c; 
            --hover: #2a2d2e; 
            --select: #37373d;
            --unsynced: #d7ba7d; /* VS Code yellow/orange */
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: grid; grid-template-columns: 250px 1fr 1fr; height: 100vh; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Sidebar & Tree Styling */
        #sidebar { background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #jstree-container { flex: 1; overflow: auto; padding: 10px 0; font-size: 13px; background: var(--sidebar); }
        
        .jstree-default .jstree-node { margin-left: 12px; }
        .jstree-default .jstree-icon { background-image: none !important; } 
        .jstree-default .jstree-ocl { font-family: monospace; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #6b717d; transition: transform 0.1s; }
        .jstree-default .jstree-closed > .jstree-ocl::before { content: '▶'; }
        .jstree-default .jstree-open > .jstree-ocl::before { content: '▼'; }
        .jstree-default .jstree-anchor { font-family: 'Segoe UI', sans-serif; font-size: 13px; line-height: 24px; height: 24px; color: var(--text) !important; padding-left: 4px; width: calc(100% - 24px); }
        .jstree-default .jstree-hovered { background: var(--hover) !important; box-shadow: none !important; border-radius: 0; }
        .jstree-default .jstree-clicked { background: var(--select) !important; box-shadow: none !important; color: #ffffff !important; border-radius: 0; }
        .jstree-default .jstree-themeicon { margin-right: 6px; font-size: 14px; text-align: center; }

        /* Custom Context Menu Styling */
        .vakata-context { background: #252526 !important; border: 1px solid #454545 !important; border-radius: 4px !important; box-shadow: 0 4px 6px rgba(0,0,0,0.3) !important; padding: 4px 0 !important; }
        .vakata-context li > a { color: #cccccc !important; padding: 6px 20px !important; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
        .vakata-context li > a:hover { background: #04395e !important; color: white !important; text-shadow: none !important; border: none !important;}
        .vakata-context .vakata-context-separator a { background: #454545 !important; border: none !important; margin: 4px 0 !important; }

        /* Editor Area */
        #editor-container { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg); min-width: 0; }
        .editor-tabs { background: var(--sidebar); display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .editor-tab { background: var(--bg); padding: 8px 16px; font-size: 13px; color: #fff; border-top: 1px solid var(--accent); cursor: pointer; }
        #monaco-editor { flex: 1; min-height: 0; } 
        
        /* Console */
        #console-area { height: 200px; background: #1e1e1e; border-top: 1px solid var(--border); overflow-y: auto; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; padding-bottom: 10px; }
        .console-header { background: var(--sidebar); padding: 6px 12px; font-size: 11px; text-transform: uppercase; color: #e7e7e7; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
        .log-entry { padding: 4px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); word-wrap: break-word; }

        /* Preview Area */
        #preview-container { background: #ffffff; display: flex; flex-direction: column; min-width: 0; }
        .browser-bar { background: #f3f3f3; padding: 8px 12px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #e1e1e1; color: #333; }
        .address-input { flex: 1; padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; background: white; color: #333; }
        .address-input:focus { outline: 1px solid var(--accent); border-color: transparent;}
        iframe { flex: 1; border: none; width: 100%; height: 100%; background: #fff; }

        /* Globals */
        .toolbar { padding: 10px 16px; background: var(--sidebar); font-size: 11px; font-weight: 600; text-transform: uppercase; color: #cccccc; display: flex; justify-content: space-between; align-items: center;}
        .action-btn { cursor: pointer; color: #4daafc; font-weight: normal; font-size: 12px; text-transform: none; }
        .action-btn:hover { color: #82c4fb; }
        
        .run-btn { background: var(--accent); color: white; border: none; padding: 8px; margin: 10px; font-size: 12px; cursor: pointer; border-radius: 2px; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .run-btn:hover { background: #1177bb; }
        .run-btn:active { transform: scale(0.98); }
        .run-btn.unsynced { background: var(--unsynced); color: #1e1e1e; font-weight: bold; }
        .run-btn.unsynced:hover { background: #e8c682; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #424242; border: 2px solid var(--bg); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f4f4f; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="toolbar">Explorer</div>
    <div id="jstree-container"></div>
    <button id="run-btn" class="run-btn" onclick="updatePreview()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2.5l9 5.5-9 5.5v-11z"/></svg>
        <span>Run Project</span>
    </button>
</div>

<div id="editor-container">
    <div class="editor-tabs">
        <div class="editor-tab" id="currentPath">index.html</div>
    </div>
    <div id="monaco-editor"></div>
    <div class="console-header">
        Terminal
        <span class="action-btn" onclick="document.getElementById('console-area').innerHTML=''">Clear</span>
    </div>
    <div id="console-area"></div>
</div>

<div id="preview-container">
    <div class="browser-bar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="#666"><path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zm0 14.5a6.5 6.5 0 1 1 0-13 6.5 6.5 0 0 1 0 13z"/><path d="M8 2.5a5.487 5.487 0 0 0-2.642.673L8.5 8.318l1.85-5.071A5.474 5.474 0 0 0 8 2.5z"/></svg>
        <input type="text" id="browserAddress" class="address-input" value="index.html">
        <span class="action-btn" onclick="previewInNewTab()">Open in New Tab ↗</span>
    </div>
    <iframe id="preview"></iframe>
</div>

<script>
    let editor, childWindow;
    let currentPath = 'index.html';
    let unsyncedChanges = false;
    
    // Default files if none are saved
    const defaultFiles = {
        'index.html': '<!DOCTYPE html>\n<html>\n<head>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1>Virtual IDE Running! 🚀</h1>\n  <p>Right-click the sidebar to add files.</p>\n  <script src="app.js"><\/script>\n</body>\n</html>',
        'app.js': 'console.log("System Sync Complete.");',
        'style.css': 'body {\n  font-family: sans-serif;\n  text-align: center;\n  margin-top: 50px;\n  color: #333;\n}'
    };

    // Load from LocalStorage or use defaults
    let files = JSON.parse(localStorage.getItem('virtual_ide_files')) || defaultFiles;

    function saveToLocal() {
        localStorage.setItem('virtual_ide_files', JSON.stringify(files));
        unsyncedChanges = true;
        document.getElementById('run-btn').classList.add('unsynced');
        document.querySelector('#run-btn span').textContent = "Run Project (Unsynced)";
    }

    // --- Keyboard Shortcuts ---
    document.addEventListener('keydown', e => {
        // Ctrl+S or Cmd+S
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            updatePreview();
        }
    });

    // --- Editor Initialization ---
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        monaco.editor.defineTheme('vscode-dark', {
            base: 'vs-dark', inherit: true, rules: [],
            colors: { 'editor.background': '#1e1e1e', 'editor.lineHighlightBackground': '#2a2d2e', 'editorLineNumber.foreground': '#858585' }
        });
        
        editor = monaco.editor.create(document.getElementById('monaco-editor'), { 
            theme: 'vscode-dark', automaticLayout: true, minimap: { enabled: false }, fontSize: 14, fontFamily: "'Fira Code', 'Consolas', monospace"
        });
        
        editor.onDidChangeModelContent(() => { 
            files[currentPath] = editor.getValue(); 
            saveToLocal();
        });
        
        renderTree();
        if (files['index.html'] !== undefined) {
            loadFile('index.html');
        } else {
            loadFile(Object.keys(files)[0] || ''); // Load first available file
        }
        
        setTimeout(updatePreview, 500); 
    });

    window.addEventListener('resize', () => { if (editor) editor.layout(); });

    // --- File Tree Logic ---
    function getFileIcon(filename) {
        if (filename.endsWith('.html')) return '🌐';
        if (filename.endsWith('.js')) return '⚡';
        if (filename.endsWith('.css')) return '🎨';
        if (filename.endsWith('.json')) return '{}';
        return '📄';
    }

    function renderTree() {
        const data = Object.keys(files).map(path => {
            const isFolder = path.endsWith('/');
            const text = path.split('/').filter(Boolean).pop();
            return {
                id: path, 
                parent: path.includes('/') && path.indexOf('/') !== path.length - 1 ? path.substring(0, path.lastIndexOf('/', path.length - 2)) + '/' || '#' : '#',
                text: text, 
                icon: isFolder ? 'jstree-folder' : getFileIcon(text)
            };
        });
        
        // Ensure parent folders exist visually
        Object.keys(files).forEach(path => {
            let parts = path.split('/').filter(Boolean);
            for(let i=0; i<parts.length-1; i++) {
                let folderId = parts.slice(0, i+1).join('/') + '/';
                if(!data.find(n => n.id === folderId)) {
                    data.push({ id: folderId, parent: i===0 ? '#' : parts.slice(0, i).join('/') + '/', text: parts[i], icon: 'jstree-folder' });
                }
            }
        });

        $('#jstree-container').jstree('destroy').jstree({
            'core': { 
                'data': data, 
                'check_callback': true, // Essential for allowing modify/create/delete
                'themes': { 'dots': false, 'icons': true } 
            },
            'plugins': ['wholerow', 'contextmenu'],
            'contextmenu': { 'items': customContextMenu }
        }).on('select_node.jstree', (e, d) => { 
            if(files[d.node.id] !== undefined && !d.node.id.endsWith('/')) loadFile(d.node.id); 
        });
    }

    // --- Context Menu Logic ---
    function customContextMenu(node) {
        return {
            "CreateFile": {
                "separator_before": false, "separator_after": false, "label": "New File",
                "action": function (obj) {
                    let name = prompt("Enter file name (e.g., script.js):");
                    if (name) {
                        let path = node.id === '#' ? name : (node.id.endsWith('/') ? node.id + name : node.parent + name);
                        if (!files[path]) {
                            files[path] = "";
                            saveToLocal();
                            renderTree();
                            loadFile(path);
                        }
                    }
                }
            },
            "CreateFolder": {
                "separator_before": false, "separator_after": true, "label": "New Folder",
                "action": function (obj) {
                    let name = prompt("Enter folder name:");
                    if (name) {
                        // We append a trailing slash to identify it as a folder in our flat structure
                        let path = node.id === '#' ? name + '/' : (node.id.endsWith('/') ? node.id + name + '/' : node.parent + name + '/');
                        files[path] = ""; // Dummy entry to force tree render
                        saveToLocal();
                        renderTree();
                    }
                }
            },
            "Rename": {
                "separator_before": false, "separator_after": false, "label": "Rename",
                "action": function (obj) {
                    let newName = prompt("Enter new name:", node.text);
                    if (newName && newName !== node.text) {
                        let oldPath = node.id;
                        let isFolder = oldPath.endsWith('/');
                        let basePath = isFolder ? oldPath.substring(0, oldPath.lastIndexOf('/', oldPath.length - 2) + 1) : oldPath.substring(0, oldPath.lastIndexOf('/') + 1);
                        let newPath = basePath + newName + (isFolder ? '/' : '');

                        if (!isFolder && files[oldPath] !== undefined) {
                            // Single File
                            files[newPath] = files[oldPath];
                            delete files[oldPath];
                            if(currentPath === oldPath) currentPath = newPath;
                        } else {
                            // Folder: Rename prefix for all nested files
                            Object.keys(files).forEach(p => {
                                if (p.startsWith(oldPath)) {
                                    files[p.replace(oldPath, newPath)] = files[p];
                                    delete files[p];
                                }
                            });
                        }
                        saveToLocal();
                        renderTree();
                        if (!isFolder) loadFile(newPath);
                    }
                }
            },
            "Delete": {
                "separator_before": false, "separator_after": false, "label": "Delete",
                "action": function (obj) {
                    if (confirm(`Are you sure you want to delete ${node.text}?`)) {
                        let path = node.id;
                        if (!path.endsWith('/') && files[path] !== undefined) {
                            delete files[path];
                        } else {
                            Object.keys(files).forEach(p => { if (p.startsWith(path)) delete files[p]; });
                        }
                        saveToLocal();
                        renderTree();
                        if (currentPath.startsWith(path)) {
                            editor.setValue("// File deleted");
                            document.getElementById('currentPath').textContent = "Deleted";
                        }
                    }
                }
            }
        };
    }

    function loadFile(path) {
        if (path === '' || path.endsWith('/')) return; // Don't load folders
        
        currentPath = path;
        document.getElementById('currentPath').textContent = path.split('/').pop();
        
        const ext = path.split('.').pop().toLowerCase();
        const languageMap = { 'js': 'javascript', 'html': 'html', 'css': 'css', 'json': 'json' };
        const lang = languageMap[ext] || 'plaintext';

        let model = monaco.editor.getModels().find(m => m.uri.path === '/' + path);
        if (!model) {
            model = monaco.editor.createModel(files[path] || "", lang, monaco.Uri.file(path));
        }
        editor.setModel(model);
    }

    // --- Service Worker Sync & Preview ---
    async function updatePreview() {
        if (!navigator.serviceWorker.controller) {
            console.warn("Service Worker not ready.");
            return;
        }

        const msgChannel = new MessageChannel();
        msgChannel.port1.onmessage = (event) => {
            if (event.data === 'ACK') {
                const path = document.getElementById('browserAddress').value;
                const url = `/virtual-project/${path}?t=${Date.now()}`;
                
                document.getElementById('preview').src = url;
                if (childWindow && !childWindow.closed) childWindow.location.href = url;

                // Reset Sync Button state
                unsyncedChanges = false;
                document.getElementById('run-btn').classList.remove('unsynced');
                document.querySelector('#run-btn span').textContent = "Run Project";
            }
        };

        navigator.serviceWorker.controller.postMessage({ type: 'UPDATE_FILES', files: files }, [msgChannel.port2]);
    }

    function previewInNewTab() {
        const path = document.getElementById('browserAddress').value;
        const url = `/virtual-project/${path}?t=${Date.now()}`;
        childWindow = window.open(url, '_blank');
    }

    // --- Console Log Interception ---
    window.addEventListener('message', e => {
        if (e.data.type === 'CONSOLE_LOG') {
            const div = document.createElement('div');
            div.className = 'log-entry';
            if (e.data.logType === 'error') div.style.color = '#f48771';
            else if (e.data.logType === 'warn') div.style.color = '#cca700';
            else div.style.color = '#cccccc';
            
            div.textContent = `> ${e.data.msg}`;
            const consoleArea = document.getElementById('console-area');
            consoleArea.appendChild(div);
            consoleArea.scrollTop = consoleArea.scrollHeight;
        }
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js', {scope: '/'});
</script>
</body>
</html>
