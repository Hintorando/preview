<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Single File Virtual IDE</title>
	<style>
		body {
			font-family: sans-serif;
			display: flex;
			flex-direction: column;
			height: 100vh;
			margin: 0;
			padding: 10px;
			box-sizing: border-box;
		}

		.editors {
			display: flex;
			gap: 10px;
			flex: 1;
		}

		textarea {
			flex: 1;
			font-family: monospace;
			padding: 10px;
			background: #1e1e1e;
			color: #d4d4d4;
			border-radius: 4px;
		}

		button {
			padding: 10px;
			cursor: pointer;
			margin-bottom: 10px;
			background: #007acc;
			color: white;
			border: none;
			border-radius: 4px;
		}

		iframe {
			flex: 1;
			border: 1px solid #ccc;
			margin-top: 10px;
			background: white;
		}
	</style>
</head>

<body>

	<button onclick="runProject()">🚀 Run Project</button>

	<div class="editors">
		<textarea id="htmlCode" placeholder="index.html">
<h1>Hello World</h1>
<link rel="stylesheet" href="style.css">
<script src="app.js"></script></textarea>

		<textarea id="jsCode" placeholder="app.js">
console.log("Virtual JS Loaded!");
document.body.append(" - Script is active.");</textarea>

		<textarea id="cssCode" placeholder="style.css">
body { background: #fafafa; color: #333; text-align: center; padding-top: 50px; }</textarea>
	</div>

	<iframe id="preview"></iframe>

	<script>
		// 1. The Service Worker code as a string
        const swCode = `
            let files = {};

            self.addEventListener('message', e => {
                if (e.data.type === 'INSTALL_FILES') files = e.data.files;
            });

            self.addEventListener('fetch', e => {
                const url = new URL(e.request.url);
                if (url.pathname.includes('/my-project/')) {
                    const fileName = url.pathname.split('/').pop() || 'index.html';
                    const content = files[fileName];
                    if (content) {
                        const type = fileName.endsWith('.js') ? 'text/javascript' 
                                   : fileName.endsWith('.css') ? 'text/css' 
                                   : 'text/html';
                        e.respondWith(new Response(content, { headers: { 'Content-Type': type } }));
                    }
                }
            });
            self.addEventListener('install', () => self.skipWaiting());
            self.addEventListener('activate', e => e.waitUntil(clients.claim()));
        `;

        // 2. Turn that string into a "Virtual File" (Blob URL)
        const swBlob = new Blob([swCode], { type: 'text/javascript' });
        const swUrl = URL.createObjectURL(swBlob);

        // 3. Register the Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swUrl).then(reg => {
                console.log("Service Worker Active");
            });
        }

        async function runProject() {
            const files = {
                'index.html': document.getElementById('htmlCode').value,
                'app.js': document.getElementById('jsCode').value,
                'style.css': document.getElementById('cssCode').value
            };

            // Send files to the worker
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'INSTALL_FILES',
                    files: files
                });

                // Small delay to ensure SW has received the files
                setTimeout(() => {
                    document.getElementById('preview').src = `./my-project/index.html?t=${Date.now()}`;
                }, 50);
            } else {
                location.reload(); // SW needs a refresh to take control sometimes
            }
        }
	</script>
</body>

</html>
