<!DOCTYPE html>
<html>
<head>
    <title>Pro Virtual IDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <style>
        :root { --bg: #282c34; --sidebar: #21252b; --border: #181a1f; --text: #abb2bf; --accent: #61afef; }
        body { font-family: 'Segoe UI', sans-serif; display: grid; grid-template-columns: 250px 1fr 1fr; height: 100vh; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Sidebar & Tree */
        #sidebar { background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .tree-item { padding: 4px 10px; cursor: pointer; display: flex; align-items: center; font-size: 13px; gap: 8px; transition: 0.2s; }
        .tree-item:hover { background: #2c313a; }
        .tree-item.active { background: #3e4451; color: white; }
        .tree-item .actions { margin-left: auto; display: none; gap: 5px; }
        .tree-item:hover .actions { display: flex; }
        .btn-icon { background: none; border: none; color: #5c6370; cursor: pointer; padding: 2px; }
        .btn-icon:hover { color: white; }

        /* Layout */
        #editor-container { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #monaco-editor { flex: 1; }
        #preview-container { background: white; display: flex; flex-direction: column; }
        iframe { flex: 1; border: none; background: white; }
        
        .toolbar { padding: 8px 12px; background: var(--sidebar); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #5c6370; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .controls { padding: 10px; border-top: 1px solid var(--border); }
        input { background: #1b1d23; border: 1px solid var(--border); color: white; padding: 4px 8px; width: calc(100% - 20px); margin-bottom: 5px; }
        .run-btn { background: var(--accent); color: #282c34; border: none; padding: 8px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 2px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="toolbar">Explorer</div>
    <div id="fileTree" style="flex:1; overflow-y:auto; padding-top:10px;"></div>
    <div class="controls">
        <input type="text" id="pathInput" placeholder="folder/file.js">
        <button class="run-btn" onclick="updatePreview()">▶ RUN PROJECT</button>
    </div>
</div>

<div id="editor-container">
    <div class="toolbar">Editor: <span id="currentPath" style="color:var(--accent)">index.html</span></div>
    <div id="monaco-editor"></div>
</div>

<div id="preview-container">
    <div class="toolbar" style="background:#ddd; color:#333;">Live Preview</div>
    <iframe id="preview"></iframe>
</div>

<script>
    let editor;
    let currentPath = 'index.html';
    let files = {
        'index.html': '<html><head><link rel="stylesheet" href="style.css"></head><body><h1>One Dark IDE</h1><script src="js/app.js"><\/script></body></html>',
        'style.css': 'body { background: #282c34; color: #abb2bf; font-family: sans-serif; text-align: center; padding-top: 50px; }',
        'js/app.js': 'console.log("Nested file loaded!");'
    };

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        // Define Atom One Dark Theme
        monaco.editor.defineTheme('one-dark', {
            base: 'vs-dark',
            inherit: true,
            rules: [
                { token: 'comment', foreground: '5c6370', fontStyle: 'italic' },
                { token: 'keyword', foreground: 'c678dd' },
                { token: 'identifier', foreground: '61afef' },
                { token: 'string', foreground: '98c379' },
                { token: 'number', foreground: 'd19a66' },
                { token: 'type', foreground: 'e5c07b' }
            ],
            colors: {
                'editor.background': '#282c34',
                'editor.foreground': '#abb2bf',
                'editorCursor.foreground': '#528bff',
                'editor.lineHighlightBackground': '#2c313a',
                'editorLineNumber.foreground': '#4b5263',
                'editor.selectionBackground': '#3e4451',
            }
        });

        editor = monaco.editor.create(document.getElementById('monaco-editor'), {
            theme: 'one-dark',
            automaticLayout: true,
            fontSize: 14,
            fontFamily: "'Fira Code', monospace",
            minimap: { enabled: false }
        });

        editor.onDidChangeModelContent(() => {
            files[currentPath] = editor.getValue();
        });

        renderTree();
        loadFile('index.html');
    });

    function renderTree() {
        const tree = document.getElementById('fileTree');
        tree.innerHTML = '';
        
        // Sort paths alphabetically
        const paths = Object.keys(files).sort();
        
        paths.forEach(path => {
            const div = document.createElement('div');
            div.className = `tree-item ${path === currentPath ? 'active' : ''}`;
            
            // Icon logic (simplified)
            const icon = path.includes('/') ? '📁' : '📄';
            
            div.innerHTML = `
                <span>${icon} ${path}</span>
                <div class="actions">
                    <button class="btn-icon" onclick="renameFile('${path}', event)">✎</button>
                    <button class="btn-icon" onclick="deleteFile('${path}', event)">×</button>
                </div>
            `;
            div.onclick = () => loadFile(path);
            tree.appendChild(div);
        });
    }

    function loadFile(path) {
        currentPath = path;
        document.getElementById('currentPath').textContent = path;
        const ext = path.split('.').pop();
        const lang = { js: 'javascript', html: 'html', css: 'css' }[ext] || 'plaintext';
        
        const model = monaco.editor.createModel(files[path], lang);
        editor.setModel(model);
        renderTree();
    }

    function addTextFile() {
        const path = document.getElementById('pathInput').value;
        if (path && !files[path]) {
            files[path] = '// New file at ' + path;
            renderTree();
            loadFile(path);
            document.getElementById('pathInput').value = '';
        }
    }

    function deleteFile(path, e) {
        e.stopPropagation();
        if (confirm(`Delete ${path}?`)) {
            delete files[path];
            const keys = Object.keys(files);
            if (currentPath === path) loadFile(keys[0] || '');
            renderTree();
        }
    }

    function renameFile(path, e) {
        e.stopPropagation();
        const newName = prompt("Rename to:", path);
        if (newName && newName !== path) {
            files[newName] = files[path];
            delete files[path];
            if (currentPath === path) currentPath = newName;
            renderTree();
            loadFile(currentPath);
        }
    }

    async function updatePreview() {
        if (!navigator.serviceWorker.controller) return;
        navigator.serviceWorker.controller.postMessage({ type: 'UPDATE_FILES', files });
        document.getElementById('preview').src = `./virtual-project/index.html?t=${Date.now()}`;
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    
    // Allow "Enter" to add files
    document.getElementById('pathInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') addTextFile();
    });
</script>

</body>
</html>
