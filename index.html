<!DOCTYPE html>
<html>
<head>
    <title>Virtual IDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <style>
        :root { --bg: #282c34; --sidebar: #21252b; --border: #181a1f; --text: #abb2bf; --accent: #61afef; }
        body { font-family: 'Segoe UI', sans-serif; display: grid; grid-template-columns: 260px 1fr 1fr; height: 100vh; margin: 0; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #sidebar { background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .folder { font-weight: bold; color: #d19a66; padding: 4px 10px; font-size: 13px; }
        .file { padding: 4px 25px; cursor: pointer; font-size: 13px; white-space: nowrap; }
        .file:hover { background: #2c313a; }
        .file.active { background: #3e4451; color: var(--accent); }
        
        #editor-container { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        #monaco-editor { flex: 1; }
        #console-area { height: 180px; background: #1b1d23; border-top: 1px solid var(--border); overflow-y: auto; font-family: monospace; padding: 5px; }
        #preview-container { background: white; display: flex; flex-direction: column; }
        iframe { flex: 1; border: none; background: white; }
        
        .toolbar { padding: 8px; background: var(--sidebar); font-size: 11px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .run-btn { background: var(--accent); color: #282c34; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 3px; }
        .external-link { color: var(--accent); text-decoration: none; font-size: 10px; border: 1px solid var(--accent); padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="toolbar">FILES</div>
    <div id="fileTree" style="flex:1; overflow-y:auto; padding-top:10px;"></div>
    <div style="padding:10px; border-top:1px solid var(--border)">
        <input type="text" id="pathInput" placeholder="folder/file.js" style="width:90%; background:#1b1d23; border:1px solid var(--border); color:white; padding:5px; margin-bottom:10px;">
        <button class="run-btn" onclick="updatePreview()">▶ RUN PROJECT</button>
    </div>
</div>

<div id="editor-container">
    <div class="toolbar">EDITOR: <span id="currentPath" style="color:var(--accent)">index.html</span></div>
    <div id="monaco-editor"></div>
    <div class="toolbar">CONSOLE</div>
    <div id="console-area"></div>
</div>

<div id="preview-container">
    <div class="toolbar" style="background:#eee; color:#333;">
        LIVE PREVIEW
        <a id="openTab" target="_blank" class="external-link">OPEN IN NEW TAB ↗</a>
    </div>
    <iframe id="preview"></iframe>
</div>

<script>
    let editor;
    let currentPath = 'index.html';
    let files = {
        'index.html': '<html><body><h1>Recursive Tree</h1><script src="js/main.js"><\/script></body></html>',
        'js/main.js': 'console.log("Deep file loaded!");\nconsole.log("Check the console immediately!");',
        'css/style.css': 'body { background: #282c34; }'
    };

    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        monaco.editor.defineTheme('one-dark', {
            base: 'vs-dark', inherit: true,
            rules: [{ token: 'keyword', foreground: 'c678dd' }],
            colors: { 'editor.background': '#282c34', 'editor.lineHighlightBackground': '#2c313a' }
        });
        editor = monaco.editor.create(document.getElementById('monaco-editor'), { theme: 'one-dark', automaticLayout: true, fontSize: 14 });
        editor.onDidChangeModelContent(() => { files[currentPath] = editor.getValue(); });
        renderTree();
        loadFile('index.html');
    });

    // RECURSIVE TREE LOGIC
    function renderTree() {
        const treeElement = document.getElementById('fileTree');
        treeElement.innerHTML = '';
        const structure = {};

        // Convert flat paths to nested object
        Object.keys(files).forEach(path => {
            const parts = path.split('/');
            let current = structure;
            parts.forEach((part, i) => {
                if (i === parts.length - 1) current[part] = path;
                else {
                    current[part] = current[part] || {};
                    current = current[part];
                }
            });
        });

        const buildHTML = (obj, container) => {
            Object.keys(obj).sort().forEach(key => {
                const val = obj[key];
                if (typeof val === 'string') {
                    const el = document.createElement('div');
                    el.className = `file ${val === currentPath ? 'active' : ''}`;
                    el.textContent = '📄 ' + key;
                    el.onclick = () => loadFile(val);
                    container.appendChild(el);
                } else {
                    const folderEl = document.createElement('div');
                    folderEl.className = 'folder';
                    folderEl.textContent = '📁 ' + key;
                    container.appendChild(folderEl);
                    const subContainer = document.createElement('div');
                    subContainer.style.marginLeft = '10px';
                    container.appendChild(subContainer);
                    buildHTML(val, subContainer);
                }
            });
        };
        buildHTML(structure, treeElement);
    }

    function loadFile(path) {
        currentPath = path;
        const ext = path.split('.').pop();
        const lang = { js: 'javascript', html: 'html', css: 'css' }[ext] || 'plaintext';
        editor.setModel(monaco.editor.createModel(files[path], lang));
        document.getElementById('currentPath').textContent = path;
        renderTree();
    }

    async function updatePreview() {
        if (!navigator.serviceWorker.controller) return;
        navigator.serviceWorker.controller.postMessage({ type: 'UPDATE_FILES', files });
        
        const timestamp = Date.now();
        const url = `./virtual-project/index.html?t=${timestamp}`;
        document.getElementById('preview').src = url;
        document.getElementById('openTab').href = url;
    }

    // Capture logs via postMessage (sent by the SW-injected script)
    window.addEventListener('message', e => {
        if (e.data.type === 'CONSOLE_LOG') {
            const area = document.getElementById('console-area');
            const div = document.createElement('div');
            div.style.color = e.data.logType === 'error' ? '#e06c75' : e.data.logType === 'warn' ? '#d19a66' : '#abb2bf';
            div.textContent = `> [${e.data.logType}] ${e.data.msg}`;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
